<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DSW Pro Wheel Configurator</title>
    <link rel="stylesheet" href="../bootstrap-5.3.0-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="vendor/bootstrap-icons/bootstrap-icons.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/monitoring.css" />
  </head>
  <body class="theme-blue">
    <div class="app-layout">
      <!-- SIDEBAR ESQUERDA FIXA -->
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-logo">
            <img src="img/app.png" alt="DSW Pro" />
          </div>
          <div class="brand-info">
            <div class="brand-title">DSW Pro</div>
            <div class="brand-subtitle">Wheel</div>
          </div>
        </div>

        <div class="sidebar-body">
          <div class="sidebar-section" id="monitoringSection">
            <div class="section-header">Calibração</div>
            <div class="tree-nav" id="calibrationTree">
              <div class="tree-item active" data-view="dashboard" data-title="Painel">
                <i class="bi bi-grid-1x2"></i>
                <span>Painel principal</span>
              </div>
              <div class="tree-item tree-parent" data-view="monitoring" data-title="Monitoramento">
                <i class="bi bi-activity"></i>
                <span>Monitoramento</span>
                <i class="bi bi-chevron-down tree-caret"></i>
              </div>
              <div class="tree-children" data-parent="monitoring">
                <div class="tree-item monitoring-item" data-view="monitoring-status" data-title="Effect Status">
                  <i class="bi bi-speedometer2"></i>
                  <span>Effect Status</span>
                </div>
                <div class="tree-item monitoring-item" data-view="monitoring-live" data-title="Effect Live Forces">
                  <i class="bi bi-graph-up"></i>
                  <span>Effect Live Forces</span>
                </div>
              </div>
              <div id="adjacentTree" class="tree-group"></div>
            </div>
          </div>
        </div>

        <div class="sidebar-footer">
          <!-- Painel de Hardware Status - Movido para Footer -->
          <div class="sidebar-section hardware-section">
            <div class="section-header">Hardware</div>
            <div class="connection-status">
              <div class="status-indicator">
                <span class="status-dot" id="connectionDot"></span>
                <span class="status-text" id="connectionState">Desconectado</span>
              </div>
            </div>
            <div class="connection-status hardware-status">
              <div class="status-indicator">
                <span class="status-dot" id="boardDot"></span>
                <span class="status-text" id="boardState">Placa: --</span>
              </div>
            </div>
            <div class="connection-status hardware-status">
              <div class="status-indicator ffb-indicator">
                <span class="status-dot ffb-dot" id="ffbDot"></span>
                <span class="status-text">Force Feedback</span>
                <span class="status-hint" id="ffbStatus">0 Hz</span>
              </div>
            </div>
          </div>
          <div class="sidebar-links icon-row">
            <button class="sidebar-link-btn icon-only" id="footerDiscord" type="button" title="Discord" aria-label="Discord">
              <i class="bi bi-chat-dots"></i>
            </button>
            <button class="sidebar-link-btn icon-only" id="footerSite" type="button" title="Site" aria-label="Site">
              <i class="bi bi-globe"></i>
            </button>
            <button class="sidebar-link-btn icon-only" id="footerAbout" type="button" title="About" aria-label="About">
              <i class="bi bi-lightning-charge"></i>
            </button>
          </div>
        </div>
      </aside>

      <!-- AREA PRINCIPAL -->
      <div class="main-wrapper">
        <!-- TOPBAR -->
        <header class="topbar">
          <div class="topbar-brand">
            <i class="bi bi-grid-1x2"></i>
            <span id="topbarTitle">Painel</span>
          </div>
          <div class="topbar-spacer"></div>
          <div class="topbar-actions" id="topbarActions">
            <!-- Botões dinâmicos para configurações adjacentes -->
          </div>
        </header>

        <!-- CONTEÚDO PRINCIPAL -->
        <div class="main-content">
          <section id="view-dashboard" class="view-panel active">
            <!-- Cards de Status -->
          <section class="status-cards">
            <div class="status-card">
              <div class="card-header">
                <i class="bi bi-cpu"></i>
                <span>Status do Hardware</span>
              </div>
              <div class="card-body">
                <div class="metric-item">
                  <span class="metric-label">Firmware</span>
                  <span class="metric-value" id="fwValue">--</span>
                </div>
                <div class="metrics-row">
                  <div class="metric-item">
                    <span class="metric-label">RAM</span>
                    <span class="metric-value" id="ramValue">--</span>
                  </div>
                  <div class="metric-item">
                    <span class="metric-label">Temp</span>
                    <span class="metric-value" id="tempValue">--</span>
                  </div>
                </div>
                <div class="metrics-row">
                  <div class="metric-item">
                    <span class="metric-label">Conexão</span>
                    <span class="metric-value" id="connValue">--</span>
                  </div>
                </div>
              </div>
            </div>

            <div class="status-card">
              <div class="card-header">
                <i class="bi bi-usb-plug"></i>
                <span>Conexão Serial</span>
              </div>
              <div class="card-body">
                <div id="portList" class="port-list"></div>
                <div class="card-actions">
                  <button id="refreshPorts" class="btn-ghost" title="Atualizar">
                    <i class="bi bi-arrow-clockwise"></i>
                  </button>
                  <button id="connectBtn" class="btn-primary-sm" title="Conectar">
                    <i class="bi bi-plug"></i>
                    Conectar
                  </button>
                  <button id="disconnectBtn" class="btn-outline" title="Desconectar">
                    <i class="bi bi-plug-fill"></i>
                  </button>
                </div>
              </div>
            </div>

            <div class="status-card">
              <div class="card-header">
                <i class="bi bi-gear-wide-connected"></i>
                <span>Main Class</span>
              </div>
              <div class="card-body">
                <label class="mainclass-label" for="mainClassSelect">Main class</label>
                <select id="mainClassSelect" class="form-select-custom"></select>
                <label class="mainclass-label" for="joystickRateSelect">Joystick rate</label>
                <select id="joystickRateSelect" class="form-select-custom"></select>
                <button id="mainClassApply" class="btn-primary-sm" style="width: 100%; margin-top: 10px;">
                  <i class="bi bi-check2-circle"></i>
                  Aplicar
                </button>
              </div>
            </div>
          </section>

          <!-- Classes Disponíveis -->
          <section class="classes-section">
            <div class="section-title">
              <span>Classes Disponíveis</span>
              <span class="badge-count" id="classCount">0</span>
              <button id="sendClassDefs" class="btn-outline btn-classes-send" title="Enviar definicao de classes">
                <i class="bi bi-send"></i>
                Enviar definicao de classes
              </button>
            </div>
            <div id="classList" class="classes-grid"></div>
          </section>
          </section>

          <section id="view-monitoring-status" class="view-panel">
            <div class="analysis-card">
              <div class="card-body">
                <div id="effectStatusGrid" class="effect-grid"></div>
              </div>
            </div>
          </section>

          <section id="view-monitoring-live" class="view-panel">
            <div class="analysis-card">
              <div class="card-body">
                <canvas id="effectLiveCanvas" class="effect-live-canvas"></canvas>
              </div>
            </div>
          </section>

          <div id="adjacentViews"></div>
        </div>

        <!-- FOOTER -->
        <footer class="app-footer">
          <div class="footer-left">
            <span class="footer-status" id="saveStatus">Pronto</span>
            <span class="footer-hint" id="footerConnection">Nenhum dispositivo</span>
          </div>

          <div class="footer-action-buttons">
            <button id="openProfilesBtn" class="hw-btn" title="Gerenciar Perfis">
              <i class="bi bi-collection"></i>
              Perfis
            </button>
            <button id="openTerminalBtn" class="hw-btn" title="Abrir Console">
              <i class="bi bi-terminal"></i>
              Terminal
            </button>
            <button id="openErrorsBtn" class="hw-btn" title="Erros e Warnings">
              <i class="bi bi-exclamation-circle"></i>
              Erros
            </button>
            <button id="openFirmwareBtn" class="hw-btn" title="Firmware Update">
              <i class="bi bi-usb-plug"></i>
              Firmware
            </button>
            <button id="sidebarSaveFlash" class="hw-btn hw-save" title="Salvar na Flash">
              <i class="bi bi-save2"></i>
              Save to flash
            </button>
            <button id="sidebarReboot" class="hw-btn hw-reboot" title="Reiniciar">
              <i class="bi bi-arrow-clockwise"></i>
              Reboot
            </button>
            <button id="sidebarFormat" class="hw-btn hw-format" title="Formatar">
              <i class="bi bi-exclamation-triangle"></i>
              Flash tools
            </button>
          </div>
        </footer>
      </div>
    </div>

    <script src="../bootstrap-5.3.0-dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/monitoring.js"></script>
    <script src="js/header-controls.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
