<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../../css/theme.css" />
    <link rel="stylesheet" href="style.css" />
    <title>TMC</title>
  </head>
  <body class="theme-blue">
    <div class="adjacent-page">
      <div class="adjacent-header">
        <div>
          <div class="adjacent-title">TMC</div>
          <div class="adjacent-subtitle">Configura??o do driver e PID do motor</div>
        </div>
        <div class="adjacent-badge" id="tmcDriverLabel">--</div>
      </div>

      <div class="tab-buttons" id="tmcTabs"></div>

      <div class="adjacent-card">
        <div class="adjacent-row">
          <div>
            <div class="adjacent-label">Estado</div>
            <div class="adjacent-value" id="tmcState">--</div>
          </div>
          <div>
            <div class="adjacent-label">Temperatura</div>
            <div class="adjacent-value" id="tmcTemp">--</div>
          </div>
          <div>
            <div class="adjacent-label">Torque / Flux</div>
            <div class="adjacent-value" id="tmcTorque">--</div>
          </div>
        </div>
      </div>

      <div class="adjacent-card">
        <div class="adjacent-label">Motor e Encoder</div>
        <div class="form-grid">
          <div class="form-field">
            <label class="form-label" for="tmcMotorType">Tipo de motor</label>
            <select id="tmcMotorType" class="form-select-custom"></select>
          </div>
          <div class="form-field">
            <label class="form-label" for="tmcEncSource">Fonte do encoder</label>
            <select id="tmcEncSource" class="form-select-custom"></select>
          </div>
          <div class="form-field">
            <label class="form-label" for="tmcPoles">Polos</label>
            <input id="tmcPoles" type="number" class="form-input-sm" min="1" max="100" />
          </div>
          <div class="form-field">
            <label class="form-label" for="tmcCpr">CPR do encoder</label>
            <input id="tmcCpr" type="number" class="form-input-sm" min="0" max="1000000" />
          </div>
        </div>
      </div>

      <div class="adjacent-card">
        <div class="adjacent-label">PID de Torque e Fluxo</div>
        <div class="form-grid">
          <div class="form-field">
            <label class="form-label" for="tmcTorqueP">Torque P</label>
            <input id="tmcTorqueP" type="number" class="form-input-sm" min="0" max="65535" />
          </div>
          <div class="form-field">
            <label class="form-label" for="tmcTorqueI">Torque I</label>
            <input id="tmcTorqueI" type="number" class="form-input-sm" min="0" max="65535" />
          </div>
          <div class="form-field">
            <label class="form-label" for="tmcFluxP">Flux P</label>
            <input id="tmcFluxP" type="number" class="form-input-sm" min="0" max="65535" />
          </div>
          <div class="form-field">
            <label class="form-label" for="tmcFluxI">Flux I</label>
            <input id="tmcFluxI" type="number" class="form-input-sm" min="0" max="65535" />
          </div>
          <div class="form-field">
            <label class="form-label" for="tmcPrecision">Precis?o PID</label>
            <input id="tmcPrecision" type="number" class="form-input-sm" min="0" max="255" />
          </div>
          <div class="form-field">
            <label class="form-label" for="tmcTorqueFilter">Filtro de Torque</label>
            <select id="tmcTorqueFilter" class="form-select-custom"></select>
          </div>
          <div class="form-field">
            <label class="form-label" for="tmcTorqueFilterFreq">Freq. do filtro</label>
            <input id="tmcTorqueFilterFreq" type="number" class="form-input-sm" min="0" max="1000" />
          </div>
        </div>
      </div>

      <div class="adjacent-card">
        <div class="adjacent-label">Op??es avan?adas</div>
        <div class="toggle-grid">
          <label class="toggle-switch">
            <input id="tmcSeqPi" type="checkbox" />
            <span class="toggle-slider"></span>
            <span>Sequential PI</span>
          </label>
          <label class="toggle-switch">
            <input id="tmcSvPwm" type="checkbox" />
            <span class="toggle-slider"></span>
            <span>SVPWM</span>
          </label>
          <label class="toggle-switch">
            <input id="tmcInvertForce" type="checkbox" />
            <span class="toggle-slider"></span>
            <span>Inverter for?a</span>
          </label>
          <label class="toggle-switch">
            <input id="tmcFluxBrake" type="checkbox" />
            <span class="toggle-slider"></span>
            <span>Flux brake</span>
          </label>
          <label class="toggle-switch">
            <input id="tmcCombineEncoder" type="checkbox" />
            <span class="toggle-slider"></span>
            <span>Combinar encoders</span>
          </label>
          <label class="toggle-switch">
            <input id="tmcAbnIndex" type="checkbox" />
            <span class="toggle-slider"></span>
            <span>ABN index</span>
          </label>
          <label class="toggle-switch">
            <input id="tmcAbnPol" type="checkbox" />
            <span class="toggle-slider"></span>
            <span>ABN invertido</span>
          </label>
        </div>
      </div>

      <div class="adjacent-card hint-card">
        <div class="adjacent-row">
          <div>
            <div class="adjacent-label">Status</div>
            <div class="adjacent-hint" id="tmcHint">Pronto</div>
          </div>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
    <script src="../../js/track-changes.js"></script>
  </body>
</html>
