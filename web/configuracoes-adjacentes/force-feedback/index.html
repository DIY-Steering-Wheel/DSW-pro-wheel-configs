<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../../css/theme.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Force Feedback</title>
  </head>
  <body class="theme-blue">
    <div class="adjacent-page">
      <div class="adjacent-header">
        <h2>Force Feedback</h2>
        <button id="refreshFfb" class="btn-outline" type="button">Atualizar</button>
      </div>
      <div class="adjacent-card">
        <div class="adjacent-row">
          <div class="adjacent-label">Status</div>
          <div class="status-pill">
            <span class="status-dot" id="ffbDotLocal"></span>
            <span id="ffbStatusLocal">0 Hz</span>
          </div>
        </div>
        <div class="adjacent-row">
          <div class="adjacent-label">CF Rate</div>
          <div id="ffbCfRate">--</div>
        </div>
        <div class="adjacent-row">
          <button id="applyFfb" class="btn-primary-sm" type="button">Aplicar</button>
          <span class="adjacent-hint">Aplicar atualiza o status.</span>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
