<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../../css/theme.css" />
    <link rel="stylesheet" href="style.css" />
    <title>DIN (Digital)</title>
  </head>
  <body class="theme-blue">
    <div class="adjacent-page">
      <div class="adjacent-header">
        <h2>DIN (Digital)</h2>
        <button id="refreshDin" class="btn-outline" type="button">Atualizar</button>
      </div>
      <div class="adjacent-card">
        <div class="adjacent-row">
          <div class="adjacent-label">Entradas ativas</div>
          <div id="dinCount">--</div>
        </div>
        <div id="dinPins" class="pin-grid"></div>
        <div class="adjacent-row">
          <label class="toggle-switch">
            <input id="dinInvert" type="checkbox" />
            <span class="toggle-slider"></span>
            <span>Invertido</span>
          </label>
        </div>
        <div class="adjacent-row">
          <button id="applyDin" class="btn-primary-sm" type="button">Aplicar</button>
          <span class="adjacent-hint" id="dinHint">--</span>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
