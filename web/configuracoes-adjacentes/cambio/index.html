<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../../css/theme.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Câmbio</title>
  </head>
  <body class="theme-blue">
    <div class="adjacent-page">
      <div class="adjacent-header">
        <h2>Câmbio</h2>
        <button id="refreshShifter" class="btn-outline" type="button">Atualizar</button>
      </div>
      <div class="adjacent-card">
        <div class="adjacent-row">
          <div class="adjacent-label">H-Shifter</div>
          <label class="toggle-switch">
            <input id="shifterToggle" type="checkbox" />
            <span class="toggle-slider"></span>
            <span id="shifterState">Desligado</span>
          </label>
        </div>
        <div class="adjacent-row">
          <div class="adjacent-label">Modo</div>
          <select id="shifterMode" class="form-select-custom"></select>
        </div>
        <div class="adjacent-row">
          <button id="applyShifter" class="btn-primary-sm" type="button">Aplicar</button>
          <span class="adjacent-hint" id="shifterHint">Status: --</span>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
