<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../../css/theme.css" />
    <link rel="stylesheet" href="style.css" />
    <title>CAN Bot?es</title>
  </head>
  <body class="theme-blue">
    <div class="adjacent-page">
      <div class="adjacent-header">
        <div>
          <div class="adjacent-title">CAN Bot?es</div>
          <div class="adjacent-subtitle">Bot?es digitais via CAN</div>
        </div>
      </div>

      <div class="adjacent-card">
        <div class="form-grid">
          <div class="form-field">
            <label class="form-label" for="canBtnAmount">N?mero de bot?es</label>
            <input id="canBtnAmount" type="number" class="form-input-sm" min="1" max="64" />
          </div>
          <div class="form-field">
            <label class="form-label" for="canBtnId">CAN ID</label>
            <input id="canBtnId" type="number" class="form-input-sm" min="1" max="2047" />
          </div>
        </div>
        <label class="toggle-switch">
          <input id="canBtnInvert" type="checkbox" />
          <span class="toggle-slider"></span>
          <span>Inverter polaridade</span>
        </label>
        <div class="adjacent-hint" id="canBtnMap">--</div>
      </div>

      <div class="adjacent-card hint-card">
        <div class="adjacent-row">
          <div>
            <div class="adjacent-label">Status</div>
            <div class="adjacent-hint" id="canBtnHint">Pronto</div>
          </div>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
    <script src="../../js/track-changes.js"></script>
  </body>
</html>
