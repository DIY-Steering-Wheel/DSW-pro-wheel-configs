<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../../css/theme.css" />
    <link rel="stylesheet" href="style.css" />
    <title>AIN (Analógico)</title>
  </head>
  <body class="theme-blue">
    <div class="adjacent-page">
      <div class="adjacent-header">
        <h2>AIN (Analógico)</h2>
        <button id="refreshAin" class="btn-outline" type="button">Atualizar</button>
      </div>
      <div class="adjacent-card">
        <div class="adjacent-row">
          <div class="adjacent-label">Entradas ativas</div>
          <div id="ainCount">--</div>
        </div>
        <div id="ainPins" class="pin-grid"></div>
        <div class="adjacent-row">
          <label class="toggle-switch">
            <input id="ainFilter" type="checkbox" />
            <span class="toggle-slider"></span>
            <span>Filtro</span>
          </label>
          <label class="toggle-switch">
            <input id="ainAutorange" type="checkbox" />
            <span class="toggle-slider"></span>
            <span>Autorange</span>
          </label>
        </div>
        <div class="adjacent-row">
          <button id="applyAin" class="btn-primary-sm" type="button">Aplicar</button>
          <span class="adjacent-hint" id="ainHint">--</span>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
