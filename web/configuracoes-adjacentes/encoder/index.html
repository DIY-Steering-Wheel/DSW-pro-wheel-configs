    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../../css/theme.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Encoder</title>
  </head>

      <div class="adjacent-header">
        <h2>Encoder</h2>
        <button id="refreshEncoder" class="btn-outline" type="button">Atualizar</button>

          <div class="adjacent-label">Classe</div>
          <select id="encoderSelect" class="form-select-custom"></select>
        </div>
        <div class="adjacent-row">
          <button id="applyEncoder" class="btn-primary-sm" type="button">Aplicar</button>
          <span class="adjacent-hint" id="encoderHint">--</span>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
