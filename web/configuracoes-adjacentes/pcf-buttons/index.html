<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../../css/theme.css" />
    <link rel="stylesheet" href="style.css" />
    <title>PCF Buttons</title>
  </head>
  <body class="theme-blue">
    <div class="adjacent-page">
      <div class="adjacent-header">
        <div>
          <div class="adjacent-title">PCF Buttons</div>
          <div class="adjacent-subtitle">Expans?o de bot?es via PCF8574</div>
        </div>
      </div>

      <div class="adjacent-card">
        <label class="toggle-switch">
          <input id="pcfInvert" type="checkbox" />
          <span class="toggle-slider"></span>
          <span>Inverter polaridade</span>
        </label>
        <label class="toggle-switch">
          <input id="pcfFast" type="checkbox" />
          <span class="toggle-slider"></span>
          <span>I2C 400kHz</span>
        </label>
        <div class="form-grid">
          <div class="form-field">
            <label class="form-label" for="pcfAmount">N?mero de bot?es</label>
            <input id="pcfAmount" type="number" class="form-input-sm" min="1" max="64" />
          </div>
        </div>
        <div class="adjacent-hint">Use m?ltiplos PCF8574 com endere?os incrementais.</div>
      </div>

      <div class="adjacent-card hint-card">
        <div class="adjacent-row">
          <div>
            <div class="adjacent-label">Status</div>
            <div class="adjacent-hint" id="pcfHint">Pronto</div>
          </div>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
    <script src="../../js/track-changes.js"></script>
  </body>
</html>
