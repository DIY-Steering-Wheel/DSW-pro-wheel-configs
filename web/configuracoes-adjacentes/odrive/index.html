<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../../css/theme.css" />
    <link rel="stylesheet" href="style.css" />
    <title>ODrive</title>
  </head>
  <body class="theme-blue">
    <div class="adjacent-page">
      <div class="adjacent-header">
        <div>
          <div class="adjacent-title">ODrive</div>
          <div class="adjacent-subtitle">Configura??o CAN e torque m?ximo</div>
        </div>
        <div class="adjacent-badge" id="odriveState">--</div>
      </div>

      <div class="tab-buttons" id="odriveTabs"></div>

      <div class="adjacent-card">
        <div class="adjacent-row">
          <div>
            <div class="adjacent-label">Tens?o</div>
            <div class="adjacent-value" id="odriveVoltage">--</div>
          </div>
          <div>
            <div class="adjacent-label">Erros</div>
            <div class="adjacent-value" id="odriveErrors">--</div>
          </div>
        </div>
      </div>

      <div class="adjacent-card">
        <div class="adjacent-label">Par?metros</div>
        <div class="form-grid">
          <div class="form-field">
            <label class="form-label" for="odriveCanId">CAN ID</label>
            <input id="odriveCanId" type="number" class="form-input-sm" min="0" max="255" />
          </div>
          <div class="form-field">
            <label class="form-label" for="odriveMaxTorque">Torque m?ximo (Nm)</label>
            <input id="odriveMaxTorque" type="number" class="form-input-sm" min="0" step="0.01" />
          </div>
        </div>
        <label class="toggle-switch">
          <input id="odriveStorePos" type="checkbox" />
          <span class="toggle-slider"></span>
          <span>Salvar offset do encoder</span>
        </label>
        <div class="adjacent-hint">Defina o torque m?ximo para mapear o FFB. ODrive aceita apenas Nm.</div>
      </div>

      <div class="adjacent-card hint-card">
        <div class="adjacent-row">
          <div>
            <div class="adjacent-label">Status</div>
            <div class="adjacent-hint" id="odriveHint">Pronto</div>
          </div>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
    <script src="../../js/track-changes.js"></script>
  </body>
</html>
