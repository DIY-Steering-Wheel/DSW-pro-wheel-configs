<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../../css/theme.css" />
    <link rel="stylesheet" href="style.css" />
    <title>VESC</title>
  </head>
  <body class="theme-blue">
    <div class="adjacent-page">
      <div class="adjacent-header">
        <div>
          <div class="adjacent-title">VESC</div>
          <div class="adjacent-subtitle">Configura??o CAN e monitoramento</div>
        </div>
        <div class="adjacent-badge" id="vescState">--</div>
      </div>

      <div class="tab-buttons" id="vescTabs"></div>

      <div class="adjacent-card">
        <div class="adjacent-row">
          <div>
            <div class="adjacent-label">Tens?o</div>
            <div class="adjacent-value" id="vescVoltage">--</div>
          </div>
          <div>
            <div class="adjacent-label">Torque (%)</div>
            <div class="adjacent-value" id="vescTorque">--</div>
          </div>
          <div>
            <div class="adjacent-label">Erros</div>
            <div class="adjacent-value" id="vescErrors">--</div>
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar" id="vescTorquePos"></div>
          <div class="progress-bar negative" id="vescTorqueNeg"></div>
        </div>
      </div>

      <div class="adjacent-card">
        <div class="adjacent-label">CAN IDs</div>
        <div class="form-grid">
          <div class="form-field">
            <label class="form-label" for="vescOffbCan">CAN ID OpenFFBoard</label>
            <input id="vescOffbCan" type="number" class="form-input-sm" min="0" max="255" />
          </div>
          <div class="form-field">
            <label class="form-label" for="vescCanId">CAN ID VESC</label>
            <input id="vescCanId" type="number" class="form-input-sm" min="0" max="255" />
          </div>
        </div>
        <label class="toggle-switch">
          <input id="vescUseEncoder" type="checkbox" />
          <span class="toggle-slider"></span>
          <span>Usar encoder absoluto</span>
        </label>
        <div class="encoder-block" id="vescEncoderBlock">
          <div class="adjacent-row">
            <div>
              <div class="adjacent-label">Posi??o</div>
              <div class="adjacent-value" id="vescPosition">--</div>
            </div>
            <div>
              <div class="adjacent-label">Taxa do encoder</div>
              <div class="adjacent-value" id="vescRate">--</div>
            </div>
          </div>
          <div class="form-grid">
            <div class="form-field">
              <label class="form-label" for="vescOffset">Offset do encoder</label>
              <input id="vescOffset" type="number" class="form-input-sm" step="0.0001" />
            </div>
          </div>
          <div class="action-row">
            <button class="btn-outline" id="vescReadPos" type="button">Ler posi??o</button>
            <button class="btn-outline" id="vescEraseOffset" type="button">Zerar offset</button>
          </div>
        </div>
      </div>

      <div class="adjacent-card hint-card">
        <div class="adjacent-row">
          <div>
            <div class="adjacent-label">Status</div>
            <div class="adjacent-hint" id="vescHint">Pronto</div>
          </div>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
    <script src="../../js/track-changes.js"></script>
  </body>
</html>
